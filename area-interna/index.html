<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Área Interna | CWB Clinical Research</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "secondary-container": "#34BDEE",
          "background": "#fcfaf6",
          "outline-variant": "#c3c6cf",
          "surface-container-high": "#eae8e4",
          "outline": "#73777f",
          "surface": "#fcfaf6",
          "on-primary-fixed-variant": "#e0f4ff",
          "tertiary-container": "#003b4e",
          "on-primary": "#ffffff",
          "on-background": "#1b1c1a",
          "surface-variant": "#e4e2de",
          "on-surface": "#1b1c1a",
          "on-primary-container": "#c5ecff",
          "primary-container": "#2F2190",
          "surface-container": "#efeeea",
          "surface-container-highest": "#e4e2de",
          "surface-tint": "#3B6EA3",
          "on-secondary": "#ffffff",
          "surface-container-low": "#f5f3ef",
          "primary": "#0E385E",
          "on-surface-variant": "#43474e",
          "surface-container-lowest": "#ffffff",
          "secondary": "#3B6EA3"
        },
        fontFamily: {
          "headline": ["Manrope", "sans-serif"],
          "body": ["Inter", "sans-serif"],
          "label": ["Inter", "sans-serif"],
        },
        borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
      },
    },
  }
</script>
<style>
.material-symbols-outlined {
  font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
  vertical-align: middle;
}
body { font-family: "Inter", sans-serif; }
h1, h2, h3, h4 { font-family: "Manrope", sans-serif; }
.clinical-pattern {
  background-image: url(../assets/marca/Pattern-principal.png);
  background-repeat: repeat;
  background-size: 280px;
}
</style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-secondary-container min-h-screen flex flex-col">

<!-- Background decorativo -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
  <div class="absolute -top-40 -right-40 w-[600px] h-[600px] rounded-full"
       style="background: radial-gradient(circle, rgba(47,33,144,0.08) 0%, transparent 70%)"></div>
  <div class="absolute -bottom-40 -left-40 w-[500px] h-[500px] rounded-full"
       style="background: radial-gradient(circle, rgba(14,56,94,0.07) 0%, transparent 70%)"></div>
  <div class="absolute inset-0 clinical-pattern opacity-[0.025]"></div>
</div>

<!-- Topo com link de volta -->
<div class="relative z-10 px-6 pt-6">
  <a href="../index.html" class="inline-flex items-center gap-1.5 text-on-surface-variant hover:text-primary transition-colors text-sm font-medium">
    <span class="material-symbols-outlined text-base">arrow_back</span>
    Voltar ao site
  </a>
</div>

<!-- Card de login centralizado -->
<main class="relative z-10 flex-1 flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="text-center mb-10">
      <a href="../index.html">
        <img src="../assets/marca/Logo-horizontal-transparente-colorida.png"
             alt="CWB Clinical Research"
             class="h-10 mx-auto"/>
      </a>
      <p class="mt-4 text-sm text-on-surface-variant">Área restrita à equipe CWB</p>
    </div>

    <!-- Card -->
    <div class="bg-surface-container-lowest rounded-2xl border border-outline-variant/20 shadow-sm p-8">
      <h1 class="text-xl font-bold text-primary mb-6" style="font-family:'Manrope',sans-serif">
        Entrar
      </h1>

      <!-- Alerta de erro -->
      <div id="error-alert" class="hidden mb-5 flex items-start gap-2.5 bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm">
        <span class="material-symbols-outlined text-base mt-0.5 flex-shrink-0">error</span>
        <span id="error-message">E-mail ou senha incorretos.</span>
      </div>

      <form id="login-form" class="space-y-5" novalidate>
        <div class="space-y-1.5">
          <label for="email" class="block text-sm font-medium text-on-surface">E-mail</label>
          <input
            id="email"
            type="email"
            autocomplete="email"
            placeholder="seu@email.com"
            class="w-full px-4 py-2.5 rounded-xl border border-outline-variant bg-surface text-on-surface text-sm placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors"
            required
          />
        </div>

        <div class="space-y-1.5">
          <label for="password" class="block text-sm font-medium text-on-surface">Senha</label>
          <div class="relative">
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              placeholder="••••••••"
              class="w-full px-4 py-2.5 pr-11 rounded-xl border border-outline-variant bg-surface text-on-surface text-sm placeholder:text-on-surface-variant/40 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary transition-colors"
              required
            />
            <button
              type="button"
              id="toggle-password"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-on-surface-variant transition-colors"
              aria-label="Mostrar senha"
            >
              <span class="material-symbols-outlined text-lg" id="eye-icon">visibility</span>
            </button>
          </div>
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 active:bg-primary/80 text-on-primary font-semibold text-sm px-6 py-3 rounded-xl transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
          style="font-family:'Manrope',sans-serif"
        >
          <span id="btn-label">Entrar</span>
          <span id="btn-spinner" class="hidden">
            <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          </span>
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-on-surface-variant/50 mt-6">
      Acesso exclusivo para colaboradores autorizados da CWB Clinical Research.
    </p>
  </div>
</main>

<!-- Supabase JS via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ─────────────────────────────────────────────
  // CONFIGURAÇÃO SUPABASE
  // Preencha com as credenciais do seu projeto em:
  // https://supabase.com/dashboard → Settings → API
  // ─────────────────────────────────────────────
  const SUPABASE_URL      = 'https://bopaymmsxkvkgjoeqilf.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJvcGF5bW1zeGt2a2dqb2VxaWxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NTIwOTksImV4cCI6MjA5MDEyODA5OX0.t9WkfB4eqJlhWGiXgbxov22GedpdMs6s-kFKJ9KHznw'

  const { createClient } = supabase
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  // Redireciona para o dashboard se já houver sessão ativa
  ;(async () => {
    const { data: { session } } = await sb.auth.getSession()
    if (session) window.location.href = './dashboard.html'
  })()

  // Toggle de visibilidade da senha
  const toggleBtn = document.getElementById('toggle-password')
  const passwordInput = document.getElementById('password')
  const eyeIcon = document.getElementById('eye-icon')
  toggleBtn.addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password'
    passwordInput.type = isHidden ? 'text' : 'password'
    eyeIcon.textContent = isHidden ? 'visibility_off' : 'visibility'
  })

  // Formulário de login
  const form = document.getElementById('login-form')
  const submitBtn = document.getElementById('submit-btn')
  const btnLabel = document.getElementById('btn-label')
  const btnSpinner = document.getElementById('btn-spinner')
  const errorAlert = document.getElementById('error-alert')
  const errorMessage = document.getElementById('error-message')

  function setLoading(loading) {
    submitBtn.disabled = loading
    btnLabel.textContent = loading ? 'Entrando…' : 'Entrar'
    btnSpinner.classList.toggle('hidden', !loading)
  }

  function showError(msg) {
    errorMessage.textContent = msg
    errorAlert.classList.remove('hidden')
  }

  function hideError() {
    errorAlert.classList.add('hidden')
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    hideError()

    const email = document.getElementById('email').value.trim()
    const password = document.getElementById('password').value

    if (!email || !password) {
      showError('Preencha e-mail e senha.')
      return
    }

    setLoading(true)

    const { error } = await sb.auth.signInWithPassword({ email, password })

    if (error) {
      setLoading(false)
      // Traduz mensagens comuns do Supabase
      if (error.message.includes('Invalid login credentials')) {
        showError('E-mail ou senha incorretos.')
      } else if (error.message.includes('Email not confirmed')) {
        showError('Confirme seu e-mail antes de entrar.')
      } else {
        showError('Erro ao entrar. Tente novamente.')
      }
    } else {
      window.location.href = './dashboard.html'
    }
  })
</script>

</body>
</html>
